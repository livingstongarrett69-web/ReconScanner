<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Recon Scan Tool UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }
    .nav {
      background: #111827;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #1f2937;
    }
    .nav a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
    }
    .stat {
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 1rem;
    }
    .muted {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 1px solid #1f2937;
      vertical-align: top;
    }
    th {
      color: #93c5fd;
    }
    .sev {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
    }
    .sev-info { background: #2563eb; color: white; }
    .sev-low { background: #16a34a; color: white; }
    .sev-medium { background: #d97706; color: white; }
    .sev-high { background: #dc2626; color: white; }
    .sev-critical { background: #7c3aed; color: white; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1220;
      padding: 0.75rem;
      border-radius: 8px;
      overflow-x: auto;
    }
    .artifacts a {
      margin-right: 1rem;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Recon Scan Tool UI</a>
  </div>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
